<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tapti Vidhya Vihar</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--p:#8B1A1A;--pd:#5C0E0E;--g:#D4A843;--gl:#E8C875;--gd:#AA8530;--ok:#2E7D32;--er:#C62828;--bl:#1565C0;--or:#E65100;--bg:#FAF8F5;--br:#E0D8D0;--tx:#1A1A1A;--t2:#5A5A5A}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Roboto',sans-serif}
body{background:var(--bg);color:var(--tx)}
/* LOGIN */
#pgLogin{display:flex;min-height:100vh;background:linear-gradient(145deg,#5C0E0E,#8B1A1A,#B03030);align-items:center;justify-content:center;padding:20px}
#pgApp{display:none;min-height:100vh}
.lbox{background:#fff;border-radius:24px;padding:36px 32px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.llogo{text-align:center;margin-bottom:14px}.llogo img{width:96px;height:96px;border-radius:50%;border:3px solid #D4A843}
.ltitle{font-size:21px;font-weight:800;color:#8B1A1A;text-align:center}
.lsub{font-size:12px;color:#5A5A5A;text-align:center;margin:4px 0 20px}
.tabs{display:flex;background:#f5f0ea;border-radius:10px;padding:4px;margin-bottom:18px}
.tab{flex:1;padding:10px;border:none;background:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;color:#8B1A1A;font-family:'Roboto'}
.tab.act{background:#8B1A1A;color:#fff}
/* FORM */
.fg{margin-bottom:14px}.fg label{display:block;font-size:13px;font-weight:500;color:#5A5A5A;margin-bottom:6px}
.inp{width:100%;padding:12px 14px;border:1.5px solid var(--br);border-radius:10px;font-size:14px;background:#f5f0ea;outline:none;font-family:'Roboto'}
.inp:focus{border-color:var(--p);background:#fff}.inp:disabled{opacity:.5}
select.inp{cursor:pointer}
.passWrap{position:relative}.passWrap .inp{padding-right:44px}
.eyeBtn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px}
.errBox{background:#fce8e8;border:1px solid #f5b8b8;border-radius:8px;padding:10px 14px;font-size:12px;color:var(--er);margin-top:12px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Roboto';transition:all .2s}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pd)}
.btn-g{background:var(--g);color:#5C0E0E}.btn-g:hover{background:var(--gd);color:#fff}
.btn-d{background:var(--er);color:#fff}.btn-d:hover{background:#a31e1e}
.btn-s{background:var(--ok);color:#fff}.btn-s:hover{background:#1b5e20}
.btn-b{background:var(--bl);color:#fff}.btn-b:hover{background:#0d47a1}
.btn-or{background:var(--or);color:#fff}.btn-or:hover{background:#bf360c}
.btn-o{background:transparent;border:1.5px solid var(--br);color:var(--t2)}.btn-o:hover{border-color:var(--p);color:var(--p)}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}.btn-full{width:100%}
/* LAYOUT */
.appWrap{display:flex;min-height:100vh}
.sidebar{width:256px;background:linear-gradient(180deg,#5C0E0E,#8B1A1A);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:200;overflow-y:auto;transition:transform .3s}
.sbHead{padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.sbLogoRow{display:flex;align-items:center;gap:10px}
.sbLogoRow img{width:42px;height:42px;border-radius:50%;border:2px solid #D4A843;background:#fff}
.sbSchoolName{font-size:13px;font-weight:700;color:#E8C875;line-height:1.2}
.sbSchoolSub{font-size:10px;color:rgba(255,255,255,.5)}
.sbUser{margin:12px 12px 0;background:rgba(255,255,255,.09);border-radius:10px;padding:12px 14px}
.sbRole{font-size:10px;color:#E8C875;font-weight:500;text-transform:uppercase;letter-spacing:1px}
.sbName{font-size:15px;font-weight:700;color:#fff;margin-top:2px}
.sbNav{flex:1;padding:10px 0}
.navSec{padding:8px 16px 4px;font-size:10px;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px}
.navItem{display:flex;align-items:center;gap:11px;padding:10px 16px;cursor:pointer;color:rgba(255,255,255,.7);font-size:13px;font-weight:500;margin:2px 8px;border-radius:8px;transition:all .2s}
.navItem:hover,.navItem.act{background:rgba(255,255,255,.14);color:#fff}
.navItem.act{background:rgba(212,168,67,.22);color:#E8C875}
.navIcon{font-size:15px;width:20px;text-align:center}
.sbFoot{padding:14px}
.logoutBtn{width:100%;background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:10px;font-size:13px;cursor:pointer;font-family:'Roboto';font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
.logoutBtn:hover{background:rgba(255,255,255,.2)}
.mainArea{margin-left:256px;flex:1;padding:24px;min-height:100vh}
.topbar{display:none;align-items:center;gap:12px;padding:12px 16px;background:linear-gradient(90deg,#5C0E0E,#8B1A1A);position:sticky;top:0;z-index:100}
.topbarTitle{color:#E8C875;font-size:15px;font-weight:700;flex:1}
.hbtn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:2px 8px}
.mobOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150}
/* PAGE */
.ph{margin-bottom:22px}.ph h1{font-size:22px;font-weight:800;color:var(--p)}.ph p{font-size:13px;color:var(--t2);margin-top:3px}
/* STATS */
.statGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.statCard{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 14px rgba(139,26,26,.1)}
.statIcon{font-size:22px;margin-bottom:8px}.statVal{font-size:26px;font-weight:800;line-height:1}.statLbl{font-size:11px;color:var(--t2);margin-top:4px;font-weight:500}
/* DASH */
.dashGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.dashCard{background:#fff;border-radius:16px;padding:20px 14px;text-align:center;cursor:pointer;box-shadow:0 2px 14px rgba(139,26,26,.1);transition:all .2s;border:2px solid transparent}
.dashCard:hover{transform:translateY(-3px);border-color:var(--p)}
.dashCardIcon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:22px}
.dashCardTitle{font-size:13px;font-weight:700}.dashCardSub{font-size:11px;color:var(--t2);margin-top:3px}
/* TABLE */
.tWrap{overflow-x:auto;border-radius:12px;box-shadow:0 2px 14px rgba(139,26,26,.1)}
table{width:100%;border-collapse:collapse;background:#fff}
thead tr{background:linear-gradient(90deg,#5C0E0E,#8B1A1A)}
th{padding:11px 14px;text-align:left;font-size:11px;font-weight:600;color:#E8C875;text-transform:uppercase;letter-spacing:.5px}
tbody tr{border-bottom:1px solid var(--br);transition:background .15s}
tbody tr:hover{background:#faf5ef}
td{padding:11px 14px;font-size:13px;vertical-align:middle}
tbody tr:last-child{border-bottom:none}
/* CHIPS */
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.chip-p{background:rgba(139,26,26,.1);color:var(--p);border:1px solid rgba(139,26,26,.2)}
.chip-ok{background:rgba(46,125,50,.1);color:var(--ok);border:1px solid rgba(46,125,50,.2)}
.chip-er{background:rgba(198,40,40,.1);color:var(--er);border:1px solid rgba(198,40,40,.2)}
.chip-gr{background:#f0ece8;color:var(--t2);border:1px solid var(--br)}
.chip-b{background:rgba(21,101,192,.1);color:var(--bl);border:1px solid rgba(21,101,192,.2)}
.chip-g{background:rgba(212,168,67,.15);color:var(--gd);border:1px solid rgba(212,168,67,.3)}
.chip-or{background:rgba(230,81,0,.1);color:var(--or);border:1px solid rgba(230,81,0,.2)}
/* MODAL */
.modalOver{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center;padding:20px}
.modalOver.show{display:flex}
.modalBox{background:#fff;border-radius:20px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modalHead{padding:16px 22px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(90deg,#5C0E0E,#8B1A1A);border-radius:20px 20px 0 0;position:sticky;top:0;z-index:1}
.modalHead h3{font-size:15px;font-weight:700;color:#E8C875}
.modalClose{background:none;border:none;color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.modalClose:hover{background:rgba(255,255,255,.2);color:#fff}
.modalBody{padding:22px}.modalFoot{padding:14px 22px;border-top:1px solid var(--br);display:flex;gap:10px;justify-content:flex-end}
/* AVATAR */
.av{width:38px;height:38px;border-radius:50%;background:rgba(139,26,26,.1);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--p);flex-shrink:0}
/* ATTENDANCE */
.attRow{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;background:#fff;box-shadow:0 2px 10px rgba(139,26,26,.08);margin-bottom:8px}
.attToggle{display:flex;border-radius:8px;overflow:hidden;border:1.5px solid var(--br)}
.attP,.attA{padding:6px 16px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:none;font-family:'Roboto'}
.attP.on{background:var(--ok);color:#fff}.attA.on{background:var(--er);color:#fff}
.attP:not(.on){color:var(--ok)}.attA:not(.on){color:var(--er)}
/* MISC */
.pbar{background:#e8e0d8;border-radius:8px;height:10px;overflow:hidden}
.pfill{height:100%;border-radius:8px}
.sWrap{position:relative;margin-bottom:14px}
.sInp{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--br);border-radius:10px;font-size:13px;background:#fff;outline:none;font-family:'Roboto'}
.sInp:focus{border-color:var(--p)}
.sIco{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t2);font-size:15px}
.secH{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.secT{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700}
.secT::before{content:'';display:block;width:4px;height:18px;background:var(--p);border-radius:4px}
.dbar{display:flex;align-items:center;gap:12px;background:#fff;border-radius:10px;padding:11px 16px;box-shadow:0 2px 10px rgba(139,26,26,.08);margin-bottom:14px}
.dbar input[type=date]{border:none;outline:none;font-size:14px;font-weight:600;color:var(--p);background:transparent;cursor:pointer;font-family:'Roboto'}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 14px rgba(139,26,26,.1);padding:20px}
.tip{background:rgba(212,168,67,.1);border-left:3px solid var(--g);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:var(--t2);margin:10px 0}
.warn{background:rgba(198,40,40,.08);border-left:3px solid var(--er);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:var(--er);margin:10px 0}
.emptyMsg{background:#fff;border-radius:14px;padding:32px;text-align:center;color:var(--t2);box-shadow:0 2px 14px rgba(139,26,26,.08)}
.flexRow{display:flex;align-items:center}
.gap4{gap:4px}.gap8{gap:8px}.gap12{gap:12px}
.wrap{flex-wrap:wrap}.sb{justify-content:space-between}
.semi{font-weight:600}.sm{font-size:12px}.xs{font-size:11px}.muted{color:var(--t2)}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
/* GRID FORM */
.fRow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.fRow{grid-template-columns:1fr}}
/* STUDENT HERO */
.stuHero{background:linear-gradient(135deg,#5C0E0E,#8B1A1A);border-radius:16px;padding:24px;margin-bottom:20px;color:#fff;display:flex;align-items:center;gap:16px}
.stuHeroAv{width:80px;height:80px;border-radius:50%;border:3px solid #D4A843;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:800;color:#fff;flex-shrink:0}
.stuHeroAv img{width:80px;height:80px;border-radius:50%;object-fit:cover}
.stuHeroInfo h2{font-size:18px;font-weight:800}
.stuHeroInfo .sid{font-size:12px;color:#E8C875;margin-top:3px}
/* BIRTHDAY */
.bdBanner{background:linear-gradient(90deg,#E65100,#FF8F00);border-radius:12px;padding:14px 18px;color:#fff;display:flex;align-items:center;gap:12px;margin-bottom:16px}
.bdIcon{font-size:28px}
/* MARKS */
.markType{display:inline-flex;align-items:center;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.markType-CT{background:rgba(21,101,192,.1);color:var(--bl)}
.markType-UT{background:rgba(106,27,154,.1);color:#6A1B9A}
.markType-HY{background:rgba(230,81,0,.1);color:var(--or)}
.markType-FY{background:rgba(139,26,26,.1);color:var(--p)}
.markType-PT{background:rgba(46,125,50,.1);color:var(--ok)}
/* FEES */
.feeRow{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--br)}
.feeRow:last-child{border-bottom:none}
.feeAmt{font-size:16px;font-weight:700}
/* GRADE */
.gA{color:var(--ok);font-weight:800}.gB{color:var(--bl);font-weight:800}.gC{color:var(--or);font-weight:800}.gD{color:var(--er);font-weight:800}
/* FEE SUMMARY CARDS */
.feeSumGrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px}
.feeSumCard{background:#fff;border-radius:14px;padding:16px;text-align:center;box-shadow:0 2px 14px rgba(139,26,26,.1)}
.feeSumAmt{font-size:22px;font-weight:800}
.feeSumLbl{font-size:11px;color:var(--t2);margin-top:4px}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .mainArea{margin-left:0;padding:14px}
  .topbar{display:flex}
  .feeSumGrid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<!-- LOGIN -->
<div id="pgLogin">
  <div class="lbox">
    <div class="llogo"><img id="logoImg" src="" alt="Logo"></div>
    <div class="ltitle">Tapti Vidhya Vihar</div>
    <div class="lsub">School Management System</div>
    <div class="tabs">
      <button class="tab act" id="tab0">&#128188; Admin / Teacher</button>
      <button class="tab" id="tab1">&#127891; Student</button>
    </div>
    <div class="fg"><label id="userLbl">Username</label><input class="inp" id="userInp" type="text" placeholder="Enter username"></div>
    <div class="fg" id="passGroup">
      <label>Password</label>
      <div class="passWrap">
        <input class="inp" id="passInp" type="password" placeholder="Enter password">
        <button class="eyeBtn" id="eyeBtn">&#128065;</button>
      </div>
    </div>
    <div class="errBox" id="errBox" style="display:none"></div>
    <button class="btn btn-p btn-full" style="margin-top:14px" id="loginBtn">Login &#8594;</button>
    <p style="text-align:center;font-size:11px;color:#5A5A5A;margin-top:14px">&#169; 2025 Tapti Vidhya Vihar</p>
  </div>
</div>
<!-- APP -->
<div id="pgApp">
  <div class="topbar">
    <button class="hbtn" id="menuBtn">&#9776;</button>
    <span class="topbarTitle">Tapti Vidhya Vihar</span>
    <button class="hbtn" id="topLogout">&#9211;</button>
  </div>
  <div class="mobOverlay" id="mobOverlay"></div>
  <div class="appWrap">
    <div class="sidebar" id="sidebar">
      <div class="sbHead">
        <div class="sbLogoRow">
          <img id="sbLogo" src="" alt="Logo">
          <div><div class="sbSchoolName">Tapti Vidhya Vihar</div><div class="sbSchoolSub">School Management</div></div>
        </div>
      </div>
      <div class="sbUser"><div class="sbRole" id="sbRole"></div><div class="sbName" id="sbName"></div></div>
      <nav class="sbNav" id="sbNav"></nav>
      <div class="sbFoot"><button class="logoutBtn" id="logoutBtn">&#9211; Logout</button></div>
    </div>
    <div class="mainArea"><div id="pageContent"></div></div>
  </div>
</div>
<!-- MODAL -->
<div class="modalOver" id="modalOver">
  <div class="modalBox">
    <div class="modalHead"><h3 id="modalTitle"></h3><button class="modalClose" id="modalCloseBtn">&#10005;</button></div>
    <div class="modalBody" id="modalBody"></div>
    <div class="modalFoot" id="modalFoot"></div>
  </div>
</div>

// DATABASE
// ══════════════════════════════════════════════════
var DB={
  _g:function(k){try{return JSON.parse(localStorage.getItem(k))||null}catch(e){return null}},
  _s:function(k,v){localStorage.setItem(k,JSON.stringify(v))},
  getClasses:function(){return this._g("tvv_cls")||[]},
  getTeachers:function(){return this._g("tvv_tea")||[]},
  getStudents:function(){return this._g("tvv_stu")||[]},
  getAttendance:function(){return this._g("tvv_att")||[]},
  getMarks:function(){return this._g("tvv_marks")||[]},
  getFees:function(){return this._g("tvv_fees")||[]},
  getSubjects:function(){return this._g("tvv_sub")||[]},
  saveClasses:function(d){this._s("tvv_cls",d)},
  saveTeachers:function(d){this._s("tvv_tea",d)},
  saveStudents:function(d){this._s("tvv_stu",d)},
  saveAttendance:function(d){this._s("tvv_att",d)},
  saveMarks:function(d){this._s("tvv_marks",d)},
  saveFees:function(d){this._s("tvv_fees",d)},
  saveSubjects:function(d){this._s("tvv_sub",d)},
  getDivisions:function(){
    var r=[];
    this.getClasses().forEach(function(c){c.divs.forEach(function(d){r.push(c.name+d)})});
    return r.sort();
  },
  genStudentId:function(cn,dv){
    var n=101,ss=this.getStudents();
    while(ss.some(function(s){return s.id===cn+dv+n})){n++}
    return cn+dv+n;
  },
  getStudentById:function(id){var ss=this.getStudents();for(var i=0;i<ss.length;i++){if(ss[i].id===id)return ss[i]}return null},
  getAttRecord:function(sid,date){var rr=this.getAttendance();for(var i=0;i<rr.length;i++){if(rr[i].sid===sid&&rr[i].date===date)return rr[i]}return null},
  saveAttRecord:function(rec){
    var rr=this.getAttendance(),idx=-1;
    for(var i=0;i<rr.length;i++){if(rr[i].sid===rec.sid&&rr[i].date===rec.date){idx=i;break}}
    if(idx>=0)rr[idx]=rec;else rr.push(rec);
    this.saveAttendance(rr);
  },
  monthAtt:function(sid,yr,mo){
    var pfx=yr+"-"+(mo<10?"0"+mo:""+mo);
    var rr=this.getAttendance().filter(function(r){return r.sid===sid&&r.date.indexOf(pfx)===0});
    var p=rr.filter(function(r){return r.ok}).length;
    return{present:p,absent:rr.length-p,total:rr.length};
  },
  getSubjectsByClass:function(cls){return this.getSubjects().filter(function(s){return s.cls===cls})},
  // FEES: all fee entries for a student, summed
  feeSummary:function(sid){
    var ff=this.getFees().filter(function(f){return f.sid===sid});
    var total=ff.reduce(function(a,f){return a+Number(f.amount)},0);
    var paid=ff.filter(function(f){return f.paid}).reduce(function(a,f){return a+Number(f.amount)},0);
    return{total:total,paid:paid,pending:total-paid,entries:ff};
  }
};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}

function gv(id){var e=document.getElementById(id);return e?e.value.trim():""}
function setPage(h){document.getElementById("pageContent").innerHTML=h;window.scrollTo(0,0)}
function spDiv(cd){var m=cd.match(/^([0-9]+)([A-Za-z]+)$/);return m?{cn:m[1],dv:m[2].toUpperCase()}:null}
function grade(p){return p>=90?"A+":p>=80?"A":p>=70?"B+":p>=60?"B":p>=50?"C":p>=40?"D":"F"}
function gradeClass(g){return g[0]==="A"?"gA":g[0]==="B"?"gB":g==="C"?"gC":"gD"}
function isBday(dob){if(!dob)return false;var t=new Date(),d=new Date(dob+"T12:00:00");return d.getMonth()===t.getMonth()&&d.getDate()===t.getDate()}
function fmtDob(dob){if(!dob)return"—";var d=new Date(dob+"T12:00:00");return d.toLocaleDateString("en-IN",{day:"2-digit",month:"long",year:"numeric"})}
function calcAge(dob){if(!dob)return"";var t=new Date(),d=new Date(dob+"T12:00:00"),a=t.getFullYear()-d.getFullYear();if(t.getMonth()<d.getMonth()||(t.getMonth()===d.getMonth()&&t.getDate()<d.getDate()))a--;return a+" yrs"}
function av(name,sz,photo){sz=sz||38;if(photo)return'<img src="'+photo+'" style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;object-fit:cover;border:2px solid #E0D8D0;flex-shrink:0">';return'<div class="av" style="width:'+sz+'px;height:'+sz+'px;font-size:'+Math.round(sz*.4)+'px">'+(name||"?")[0].toUpperCase()+'</div>'}
function examLbl(t){return{CT:"Class Test",UT:"Unit Test",HY:"Half Yearly",FY:"Final Year",PT:"Practical"}[t]||t}
function monName(m){return["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][m-1]}
function monFull(m){return["January","February","March","April","May","June","July","August","September","October","November","December"][m-1]}

var loginTab=0;
function switchTab(t){
  loginTab=t;
  document.getElementById("tab0").className="tab"+(t===0?" act":"");
  document.getElementById("tab1").className="tab"+(t===1?" act":"");
  document.getElementById("passGroup").style.display=t===0?"block":"none";
  document.getElementById("userLbl").textContent=t===0?"Username":"Student ID (e.g. 10A101)";
  document.getElementById("errBox").style.display="none";
  document.getElementById("userInp").value="";
  document.getElementById("passInp").value="";
}
function doLogin(){
  var u=gv("userInp"),p=gv("passInp"),eb=document.getElementById("errBox");
  eb.style.display="none";
  if(!u){eb.textContent="Enter username or ID";eb.style.display="block";return}
  if(loginTab===0){
    if(u.toLowerCase()==="a"&&p==="123"){CU={role:"admin",id:"a",name:"Admin"};startApp();return}
    var ts=DB.getTeachers(),ft=null;
    for(var i=0;i<ts.length;i++){if(ts[i].user===u.toLowerCase()&&ts[i].pw===p){ft=ts[i];break}}
    if(ft){CU={role:"teacher",id:ft.id,name:ft.name,teacher:ft};startApp();return}
    eb.textContent="Invalid username or password";eb.style.display="block";return;
  }
  var ss=DB.getStudents(),fs=null;
  for(var j=0;j<ss.length;j++){if(ss[j].id===u.toUpperCase()){fs=ss[j];break}}
  if(fs){CU={role:"student",id:fs.id,name:fs.name,student:fs};startApp();return}
  eb.textContent="Student ID not found";eb.style.display="block";
}
function doLogout(){CU=null;closeSB();document.getElementById("pgLogin").style.display="flex";document.getElementById("pgApp").style.display="none";document.getElementById("userInp").value="";document.getElementById("passInp").value=""}

function startApp(){
  document.getElementById("pgLogin").style.display="none";
  document.getElementById("pgApp").style.display="block";
  document.getElementById("sbName").textContent=CU.name;
  document.getElementById("sbRole").textContent={admin:"Super Admin",teacher:"Teacher",student:"Student"}[CU.role];
  buildNav();closeSB();
  if(CU.role==="student"&&CU.student&&isBday(CU.student.dob)){setTimeout(function(){bdModal(CU.student.name)},600)}
  navTo(CU.role==="admin"?"dash":CU.role==="teacher"?"tdash":"sprof");
}
function bdModal(name){
  openModal("&#127881; Happy Birthday!",

    '<button class="btn btn-p" id="bdOk">Thank You! &#128522;</button>'

}

function rClasses(){
  var cls=DB.getClasses();
  var h='<div class="ph"><h1>Classes &amp; Divisions</h1></div>';
  h+='<div class="secH"><div class="secT">Classes ('+cls.length+')</div><button class="btn btn-p btn-sm" id="addClsBtn">+ Add Class</button></div>';
  if(!cls.length)h+='<div class="emptyMsg">No classes yet.</div>';
  else cls.forEach(function(c){
    h+='<div class="card mb12"><div class="flexRow sb wrap gap12">';
    h+='<div class="flexRow gap12"><div style="width:46px;height:46px;background:rgba(212,168,67,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:var(--gd)">'+c.name+'</div>';
    h+='<div><div class="semi">Class '+c.name+'</div><div class="sm muted">'+c.divs.length+' division(s)</div></div></div>';
    h+='<div class="flexRow gap8"><button class="btn btn-g btn-sm addDivBtn" data-cid="'+c.id+'">+ Division</button><button class="btn btn-d btn-sm delClsBtn" data-cid="'+c.id+'">&#128465;</button></div></div>';
    if(c.divs.length){
      h+='<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--br)"><div class="xs muted mb8">Divisions</div><div class="flexRow wrap gap8">';
      c.divs.forEach(function(d){h+='<span class="chip chip-p" style="font-size:13px;padding:5px 12px">'+c.name+d+' <span class="remDivBtn" data-cid="'+c.id+'" data-dv="'+d+'" style="cursor:pointer;color:var(--er);margin-left:4px">&#10005;</span></span>'});
      h+='</div></div>';
    }
    h+='</div>';
  });
  setPage(h);
  document.getElementById("addClsBtn").addEventListener("click",function(){
    openModal("Add Class",'<div class="fg"><label>Class Name *</label><input class="inp" id="mcn" placeholder="e.g. 8, 9, 10"></div>',
      '<button class="btn btn-o" id="mcc">Cancel</button><button class="btn btn-p" id="mca">Add</button>');
    document.getElementById("mcc").addEventListener("click",closeModal);
    document.getElementById("mca").addEventListener("click",function(){
      var n=gv("mcn");if(!n)return alert("Enter class name");
      var cl=DB.getClasses();if(cl.some(function(x){return x.name===n}))return alert("Exists");
      cl.push({id:uid(),name:n,divs:[]});DB.saveClasses(cl);closeModal();rClasses();
    });
  });
  document.querySelectorAll(".addDivBtn").forEach(function(b){
    b.addEventListener("click",function(){
      var cid=b.getAttribute("data-cid");
      openModal("Add Division",'<div class="fg"><label>Division *</label><input class="inp" id="mdn" placeholder="A" maxlength="3"></div>',
        '<button class="btn btn-o" id="mdc">Cancel</button><button class="btn btn-p" id="mda">Add</button>');
      document.getElementById("mdc").addEventListener("click",closeModal);
      document.getElementById("mda").addEventListener("click",function(){
        var d=gv("mdn").toUpperCase();if(!d)return alert("Enter division");
        var cl=DB.getClasses(),c=null;for(var i=0;i<cl.length;i++){if(cl[i].id===cid){c=cl[i];break}}
        if(!c)return;if(c.divs.indexOf(d)>=0)return alert("Exists");
        c.divs.push(d);DB.saveClasses(cl);closeModal();rClasses();
      });
    });
  });
  document.querySelectorAll(".delClsBtn").forEach(function(b){
    b.addEventListener("click",function(){
      if(!confirm("Delete class?"))return;
      DB.saveClasses(DB.getClasses().filter(function(c){return c.id!==b.getAttribute("data-cid")}));rClasses();
    });
  });
  document.querySelectorAll(".remDivBtn").forEach(function(s){
    s.addEventListener("click",function(){
      if(!confirm("Remove division?"))return;
      var cid=s.getAttribute("data-cid"),dv=s.getAttribute("data-dv"),cl=DB.getClasses();
      for(var i=0;i<cl.length;i++){if(cl[i].id===cid){cl[i].divs=cl[i].divs.filter(function(x){return x!==dv});break}}
      DB.saveClasses(cl);rClasses();
    });
  });
}

// ══════════════════════════════════════════════════
function rTeachers(){
  var ts=DB.getTeachers();
  var h='<div class="ph"><h1>Teachers</h1></div>';
  h+='<div class="secH"><div class="secT">Teachers ('+ts.length+')</div><button class="btn btn-p btn-sm" id="addTeaBtn">+ Add Teacher</button></div>';
  if(!ts.length)h+='<div class="emptyMsg">No teachers yet.</div>';
  else{
    h+='<div class="tWrap"><table><thead><tr><th>Teacher</th><th>Username</th><th>Class</th><th>Actions</th></tr></thead><tbody>';
    ts.forEach(function(t){
      h+='<tr><td><div class="flexRow gap12">'+av(t.name)+'<b>'+t.name+'</b></div></td>';
      h+='<td><span class="chip chip-gr">@'+t.user+'</span></td>';
      h+='<td>'+(t.cls?'<span class="chip chip-p">'+t.cls+'</span>':'<span class="muted sm">—</span>')+'</td>';
      h+='<td><div class="flexRow gap8"><button class="btn btn-o btn-sm editTeaBtn" data-tid="'+t.id+'">&#9999;</button><button class="btn btn-d btn-sm delTeaBtn" data-tid="'+t.id+'">&#128465;</button></div></td></tr>';
    });
    h+='</tbody></table></div>';
  }
  setPage(h);
  function teaModal(tid){
    var t=tid?(function(){var ts2=DB.getTeachers();for(var i=0;i<ts2.length;i++){if(ts2[i].id===tid)return ts2[i]}return null})():null;
    var ds=DB.getDivisions(),opts='<option value="">— No class —</option>';
    ds.forEach(function(d){opts+='<option value="'+d+'"'+(t&&t.cls===d?" selected":"")+'>Class '+d+'</option>'});
    openModal(t?"Edit Teacher":"Add Teacher",
      '<div class="fg"><label>Full Name *</label><input class="inp" id="mtn" value="'+(t?t.name:"")+'"></div>'+
      '<div class="fg"><label>Username *</label><input class="inp" id="mtu" value="'+(t?t.user:"")+'"></div>'+
      '<div class="fg"><label>'+(t?"New Password (blank=keep)":"Password *")+'</label><input class="inp" id="mtp" type="password"></div>'+
      '<div class="fg"><label>Assign Class</label><select class="inp" id="mtc">'+opts+'</select></div>',
      '<button class="btn btn-o" id="mtcancel">Cancel</button><button class="btn btn-p" id="mtsave">'+(t?"Save":"Add")+'</button>'
    );
    document.getElementById("mtcancel").addEventListener("click",closeModal);
    document.getElementById("mtsave").addEventListener("click",function(){
      var n=gv("mtn"),u=gv("mtu").toLowerCase(),pw=gv("mtp"),cls=document.getElementById("mtc").value;
      if(!n||!u)return alert("Name and username required");
      var teachers=DB.getTeachers();
      for(var i=0;i<teachers.length;i++){if(teachers[i].user===u&&teachers[i].id!==tid)return alert("Username taken")}
      if(tid){
        for(var j=0;j<teachers.length;j++){if(teachers[j].id===tid){teachers[j].name=n;teachers[j].user=u;if(pw)teachers[j].pw=pw;teachers[j].cls=cls||null;break}}
      }else{
        if(!pw)return alert("Password required");
        teachers.push({id:uid(),name:n,user:u,pw:pw,cls:cls||null});
      }
      DB.saveTeachers(teachers);closeModal();rTeachers();
    });
  }
  document.getElementById("addTeaBtn").addEventListener("click",function(){teaModal(null)});
  document.querySelectorAll(".editTeaBtn").forEach(function(b){b.addEventListener("click",function(){teaModal(b.getAttribute("data-tid"))})});
  document.querySelectorAll(".delTeaBtn").forEach(function(b){
    b.addEventListener("click",function(){
      if(!confirm("Delete teacher?"))return;
      DB.saveTeachers(DB.getTeachers().filter(function(t){return t.id!==b.getAttribute("data-tid")}));rTeachers();
    });
  });
}

function rAllStudents(){
  var divs=DB.getDivisions(),stus=DB.getStudents();
  if(stuFilter)stus=stus.filter(function(s){return s.cls+s.div===stuFilter});
  if(stuQ)stus=stus.filter(function(s){return(s.name+s.id).toLowerCase().indexOf(stuQ.toLowerCase())>=0});
  var h='<div class="ph"><h1>All Students</h1></div>';
  h+='<div class="sWrap"><span class="sIco">&#128269;</span><input class="sInp" id="stuSearch" placeholder="Search name or ID..." value="'+stuQ+'"></div>';
  if(divs.length){
    h+='<div class="flexRow wrap gap8 mb12"><span class="chip '+(stuFilter?"chip-gr":"chip-p")+'" style="cursor:pointer;padding:5px 12px" id="fAll">All</span>';
    divs.forEach(function(d){h+='<span class="chip '+(stuFilter===d?"chip-p":"chip-gr")+'" style="cursor:pointer;padding:5px 12px" data-div="'+d+'">'+d+'</span>'});
    h+='</div>';
  }
  if(!stus.length)h+='<div class="emptyMsg">No students.</div>';
  else{
    h+='<div class="tWrap"><table><thead><tr><th>Student</th><th>ID</th><th>Class</th><th>Father</th><th>Mobile</th><th>Fees Pending</th><th>Actions</th></tr></thead><tbody>';
    stus.forEach(function(s){
      var bd=isBday(s.dob)?" &#127881;":"",fsm=DB.feeSummary(s.id);
      h+='<tr>';
      h+='<td><div class="flexRow gap12">'+av(s.name,34,s.photo)+'<div><div class="semi">'+s.name+bd+'</div><div class="xs muted">'+(s.dob?calcAge(s.dob):"")+'</div></div></div></td>';
      h+='<td><span class="chip chip-gr" style="font-family:monospace">'+s.id+'</span></td>';
      h+='<td><span class="chip chip-p">'+s.cls+s.div+'</span></td>';
      h+='<td class="sm">'+(s.fatherName||"—")+'</td>';
      h+='<td class="sm">'+(s.mobile||"—")+'</td>';
      h+='<td>'+(fsm.pending>0?'<span class="chip chip-er">&#8377;'+fsm.pending+'</span>':'<span class="chip chip-ok">Clear</span>')+'</td>';
      h+='<td><div class="flexRow gap4"><button class="btn btn-o btn-sm vStuBtn" data-sid="'+s.id+'">&#128065;</button><button class="btn btn-d btn-sm dStuBtn" data-sid="'+s.id+'">&#128465;</button></div></td>';
      h+='</tr>';
    });
    h+='</tbody></table></div>';
  }
  setPage(h);
  document.getElementById("stuSearch").addEventListener("input",function(){stuQ=this.value;rAllStudents()});
  var fa=document.getElementById("fAll");if(fa)fa.addEventListener("click",function(){stuFilter="";rAllStudents()});
  document.querySelectorAll("[data-div]").forEach(function(el){el.addEventListener("click",function(){stuFilter=el.getAttribute("data-div");rAllStudents()})});
  document.querySelectorAll(".vStuBtn").forEach(function(b){b.addEventListener("click",function(){stuDetailModal(b.getAttribute("data-sid"))})});
  document.querySelectorAll(".dStuBtn").forEach(function(b){
    b.addEventListener("click",function(){
      if(!confirm("Delete student and all their data?"))return;
      var sid=b.getAttribute("data-sid");
      DB.saveStudents(DB.getStudents().filter(function(s){return s.id!==sid}));
      DB.saveAttendance(DB.getAttendance().filter(function(r){return r.sid!==sid}));
      DB.saveMarks(DB.getMarks().filter(function(m){return m.sid!==sid}));
      DB.saveFees(DB.getFees().filter(function(f){return f.sid!==sid}));
      rAllStudents();
    });
  });
}

function rSubjects(){
  var divs=DB.getDivisions(),subs=DB.getSubjects();
  var h='<div class="ph"><h1>Subject Management</h1><p>Admin adds subjects per class. Teachers use these when entering marks.</p></div>';
  h+='<div class="secH"><div class="secT">Subjects ('+subs.length+')</div><button class="btn btn-p btn-sm" id="addSubBtn">+ Add Subject</button></div>';
  if(!divs.length){h+='<div class="tip">Create classes first.</div>';setPage(h);return}
  if(!subs.length)h+='<div class="emptyMsg">No subjects yet.</div>';
  else{
    var byClass={};
    subs.forEach(function(s){if(!byClass[s.cls])byClass[s.cls]=[];byClass[s.cls].push(s)});
    Object.keys(byClass).sort().forEach(function(cl){
      h+='<div class="card mb12"><div class="flexRow sb mb10"><div class="secT">Class '+cl+'</div><span class="chip chip-b">'+byClass[cl].length+' subjects</span></div><div class="flexRow wrap gap8">';
      byClass[cl].forEach(function(s){
        h+='<span class="chip chip-b" style="font-size:13px;padding:5px 14px">'+s.name+' <span class="delSubBtn" data-id="'+s.id+'" style="cursor:pointer;color:var(--er);margin-left:6px;font-weight:700">&#10005;</span></span>';
      });
      h+='</div></div>';
    });
  }
  setPage(h);
  document.getElementById("addSubBtn").addEventListener("click",function(){
    var opts='<option value="">— Select class —</option>';
    divs.forEach(function(d){opts+='<option value="'+d+'">Class '+d+'</option>'});
    openModal("Add Subject",
      '<div class="fg"><label>Class *</label><select class="inp" id="msc">'+opts+'</select></div>'+
      '<div class="fg"><label>Subject Name *</label><input class="inp" id="msn" placeholder="e.g. Mathematics, English, Science"></div>',
      '<button class="btn btn-o" id="mscancel">Cancel</button><button class="btn btn-p" id="mssave">Add Subject</button>'
    );
    document.getElementById("mscancel").addEventListener("click",closeModal);
    document.getElementById("mssave").addEventListener("click",function(){
      var cls=document.getElementById("msc").value,nm=gv("msn");
      if(!cls)return alert("Select a class");if(!nm)return alert("Enter subject name");
      var subs2=DB.getSubjects();
      if(subs2.some(function(s){return s.cls===cls&&s.name.toLowerCase()===nm.toLowerCase()}))return alert("Subject already exists for this class");
      subs2.push({id:uid(),cls:cls,name:nm});DB.saveSubjects(subs2);closeModal();rSubjects();
    });
  });
  document.querySelectorAll(".delSubBtn").forEach(function(sp){
    sp.addEventListener("click",function(){
      if(!confirm("Remove subject?"))return;
      DB.saveSubjects(DB.getSubjects().filter(function(s){return s.id!==sp.getAttribute("data-id")}));rSubjects();
    });
  });
}

// ADMIN — FEE STRUCTURE (Admin sets fee types & amounts per class)
// ══════════════════════════════════════════════════
function rFeeSetup(){
  var divs=DB.getDivisions();
  // feeStructure: [{id, cls, type, amount, label}]
  var fs=JSON.parse(localStorage.getItem("tvv_feeStruct")||"[]");
  var h='<div class="ph"><h1>Fee Structure</h1><p>Admin defines fee types and amounts per class. Teachers collect from students.</p></div>';
  h+='<div class="secH"><div class="secT">Fee Types ('+fs.length+')</div><button class="btn btn-p btn-sm" id="addFSBtn">+ Add Fee Type</button></div>';
  if(!divs.length){h+='<div class="tip">Create classes first.</div>';setPage(h);return}
  if(!fs.length)h+='<div class="emptyMsg">No fee types defined yet. Add fee types for each class.</div>';
  else{
    var byC={};fs.forEach(function(f){if(!byC[f.cls])byC[f.cls]=[];byC[f.cls].push(f)});
    Object.keys(byC).sort().forEach(function(cl){
      var total=byC[cl].reduce(function(a,f){return a+Number(f.amount)},0);
      h+='<div class="card mb12"><div class="flexRow sb mb12"><div class="secT">Class '+cl+'</div><span class="chip chip-b">Total: &#8377;'+total+'</span></div>';
      h+='<div class="tWrap"><table><thead><tr><th>Fee Type</th><th>Amount</th><th>Actions</th></tr></thead><tbody>';
      byC[cl].forEach(function(f){
        h+='<tr><td class="semi">'+f.label+'</td><td style="color:var(--bl);font-weight:700">&#8377;'+f.amount+'</td>';
        h+='<td><div class="flexRow gap8"><button class="btn btn-o btn-sm editFSBtn" data-id="'+f.id+'">&#9999;</button><button class="btn btn-d btn-sm delFSBtn" data-id="'+f.id+'">&#128465;</button></div></td></tr>';
      });
      h+='</tbody></table></div></div>';
    });
  }
  setPage(h);
  function fsModal(fid){
    var ef=fid?(function(){for(var i=0;i<fs.length;i++){if(fs[i].id===fid)return fs[i]}return null})():null;
    var opts='<option value="">— Select class —</option>';
    divs.forEach(function(d){opts+='<option value="'+d+'"'+(ef&&ef.cls===d?" selected":"")+'>Class '+d+'</option>'});
    openModal(ef?"Edit Fee Type":"Add Fee Type",
      '<div class="fg"><label>Class *</label><select class="inp" id="mfsc">'+opts+'</select></div>'+
      '<div class="fg"><label>Fee Label * (e.g. Tuition Fee, Exam Fee)</label><input class="inp" id="mfsl" value="'+(ef?ef.label:"")+'" placeholder="e.g. Monthly Tuition Fee"></div>'+
      '<div class="fg"><label>Amount (&#8377;) *</label><input class="inp" id="mfsa" type="number" min="1" value="'+(ef?ef.amount:"")+'" placeholder="e.g. 500"></div>',
      '<button class="btn btn-o" id="mfscancel">Cancel</button><button class="btn btn-p" id="mfssave">'+(ef?"Save":"Add")+'</button>'
    );
    document.getElementById("mfscancel").addEventListener("click",closeModal);
    document.getElementById("mfssave").addEventListener("click",function(){
      var cls=document.getElementById("mfsc").value,lbl=gv("mfsl"),amt=parseFloat(gv("mfsa"));
      if(!cls)return alert("Select class");if(!lbl)return alert("Enter fee label");if(isNaN(amt)||amt<=0)return alert("Enter valid amount");
      if(fid){for(var i=0;i<fs.length;i++){if(fs[i].id===fid){fs[i].cls=cls;fs[i].label=lbl;fs[i].amount=amt;break}}}
      else{fs.push({id:uid(),cls:cls,label:lbl,amount:amt})}
      localStorage.setItem("tvv_feeStruct",JSON.stringify(fs));closeModal();rFeeSetup();
    });
  }
  document.getElementById("addFSBtn").addEventListener("click",function(){fsModal(null)});
  document.querySelectorAll(".editFSBtn").forEach(function(b){b.addEventListener("click",function(){fsModal(b.getAttribute("data-id"))})});
  document.querySelectorAll(".delFSBtn").forEach(function(b){
    b.addEventListener("click",function(){
      if(!confirm("Delete fee type?"))return;
      var filtered=fs.filter(function(f){return f.id!==b.getAttribute("data-id")});
      localStorage.setItem("tvv_feeStruct",JSON.stringify(filtered));rFeeSetup();
    });
  });
}

function showFeeDetails(sid,sname,canEdit){
  var sm=DB.feeSummary(sid);
  var h='<div class="feeSumGrid" style="margin-bottom:16px">'+
    '<div class="feeSumCard"><div class="feeSumAmt" style="color:var(--bl);font-size:18px">&#8377;'+sm.total+'</div><div class="feeSumLbl">Total</div></div>'+
    '<div class="feeSumCard"><div class="feeSumAmt" style="color:var(--ok);font-size:18px">&#8377;'+sm.paid+'</div><div class="feeSumLbl">Paid</div></div>'+
    '<div class="feeSumCard"><div class="feeSumAmt" style="color:'+(sm.pending>0?"var(--er)":"var(--ok)")+';font-size:18px">&#8377;'+sm.pending+'</div><div class="feeSumLbl">Pending</div></div>'+
    '</div>';
  if(!sm.entries.length)h+='<div class="tip">No fee entries yet.</div>';
  else{
    sm.entries.forEach(function(f){
      h+='<div class="feeRow"><div><div class="semi">'+f.label+'</div><div class="xs muted">'+(f.period?f.period+" | ":"")+f.date+(f.note?' | <i>'+f.note+'</i>':'')+'</div></div>';
      h+='<div class="flexRow gap8"><span class="feeAmt">&#8377;'+f.amount+'</span>';
      h+='<span class="chip '+(f.paid?"chip-ok":"chip-er")+'">'+(f.paid?"Paid":"Pending")+'</span>';
      if(canEdit&&!f.paid)h+='<button class="btn btn-s btn-sm markPaidBtn" data-fid="'+f.id+'">Mark Paid</button>';
      if(canEdit)h+='<button class="btn btn-d btn-sm delFeeEntryBtn" data-fid="'+f.id+'">&#128465;</button>';
      h+='</div></div>';
    });
  }
  openModal("Fees — "+sname,h,'<button class="btn btn-o" id="mfeeclose">Close</button>');
  document.getElementById("mfeeclose").addEventListener("click",closeModal);
  if(canEdit){
    document.querySelectorAll(".markPaidBtn").forEach(function(b){
      b.addEventListener("click",function(){
        var ff=DB.getFees();for(var i=0;i<ff.length;i++){if(ff[i].id===b.getAttribute("data-fid")){ff[i].paid=true;break}}
        DB.saveFees(ff);closeModal();rTFees();
      });
    });
    document.querySelectorAll(".delFeeEntryBtn").forEach(function(b){
      b.addEventListener("click",function(){
        if(!confirm("Delete entry?"))return;
        DB.saveFees(DB.getFees().filter(function(f){return f.id!==b.getAttribute("data-fid")}));closeModal();rTFees();
      });
    });
  }
}

function rAttReport(){
  if(!arCls){var d2=DB.getDivisions();if(d2.length)arCls=d2[0]}
  if(!arDate)arDate=today();
  var divs=DB.getDivisions(),stus=arCls?DB.getStudents().filter(function(s){return s.cls+s.div===arCls}):[];
  var am={};stus.forEach(function(s){var r=DB.getAttRecord(s.id,arDate);am[s.id]=r?r.ok:null});
  var pr=Object.keys(am).filter(function(k){return am[k]===true}).length;
  var ab=Object.keys(am).filter(function(k){return am[k]===false}).length;
  var h='<div class="ph"><h1>Attendance Report</h1></div>';
  h+='<div class="flexRow wrap gap8 mb12">';
  divs.forEach(function(d){h+='<span class="chip '+(arCls===d?"chip-p":"chip-gr")+'" style="cursor:pointer;padding:5px 12px" data-arcls="'+d+'">'+d+'</span>'});
  h+='</div><div class="dbar">&#128197; <input type="date" id="arDt" value="'+arDate+'" max="'+today()+'"></div>';
  if(stus.length){
    h+='<div class="flexRow wrap gap8 mb12"><span class="chip chip-ok">Present: '+pr+'</span><span class="chip chip-er">Absent: '+ab+'</span><span class="chip chip-gr">Unmarked: '+(stus.length-pr-ab)+'</span></div>';
    h+='<div class="tWrap"><table><thead><tr><th>Student</th><th>ID</th><th>Status</th></tr></thead><tbody>';
    stus.forEach(function(s){var v=am[s.id];
      h+='<tr><td><div class="flexRow gap12">'+av(s.name,32,s.photo)+'<b>'+s.name+'</b></div></td>';
      h+='<td><span class="chip chip-gr">'+s.id+'</span></td>';
      h+='<td>'+(v===true?'<span class="chip chip-ok">&#10003; Present</span>':v===false?'<span class="chip chip-er">&#10007; Absent</span>':'<span class="chip chip-gr">— Unmarked</span>')+'</td></tr>';
    });

  }else h+='<div class="tip">Select a class above.</div>';
  setPage(h);
  var di=document.getElementById("arDt");if(di)di.addEventListener("change",function(){arDate=this.value;rAttReport()});
  document.querySelectorAll("[data-arcls]").forEach(function(el){el.addEventListener("click",function(){arCls=el.getAttribute("data-arcls");rAttReport()})});
}

    });

  document.getElementById("tAddBtn").addEventListener("click",function(){editStuId=null;rTAdd()});

  document.querySelectorAll(".es2").forEach(function(b){b.addEventListener("click",function(){editStuId=b.getAttribute("data-sid");rTAdd()})});
  document.querySelectorAll(".ds2").forEach(function(b){
    b.addEventListener("click",function(){
      if(!confirm("Delete student?"))return;
      var sid=b.getAttribute("data-sid");
      DB.saveStudents(DB.getStudents().filter(function(s){return s.id!==sid}));
      DB.saveAttendance(DB.getAttendance().filter(function(r){return r.sid!==sid}));
      DB.saveMarks(DB.getMarks().filter(function(m){return m.sid!==sid}));
      DB.saveFees(DB.getFees().filter(function(f){return f.sid!==sid}));
      rTStudents();
    });
  });
}

// TEACHER — ADD/EDIT STUDENT
// ══════════════════════════════════════════════════
function rTAdd(){
  PAGE="tadd";pendingPhoto=null;
  document.querySelectorAll(".navItem").forEach(function(el){el.className="navItem"+(el.getAttribute("data-page")==="tadd"?" act":"")});
  var s=editStuId?(function(){var ss=DB.getStudents();for(var i=0;i<ss.length;i++){if(ss[i].id===editStuId)return ss[i]}return null})():null;
  var t=CU.teacher,divs=t.cls?[t.cls]:DB.getDivisions();
  var opts='<option value="">— Select Class —</option>';
  divs.forEach(function(d){opts+='<option value="'+d+'"'+(s&&(s.cls+s.div)===d?" selected":"")+'>Class '+d+'</option>'});
  var ep=s&&s.photo?s.photo:"";
  var pp=ep?'<img id="pp" src="'+ep+'" style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--g);display:block;margin:0 auto 8px">':'<div id="pp" style="width:90px;height:90px;border-radius:50%;background:rgba(139,26,26,.08);border:3px dashed var(--br);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--p);margin:0 auto 8px">&#128100;</div>';
  setPage(
    '<div class="ph"><h1>'+(s?"Edit Student":"Add Student")+'</h1></div>'+
    '<div class="card" style="max-width:560px">'+
    '<div style="text-align:center;margin-bottom:20px">'+pp+
    '<div class="flexRow gap8" style="justify-content:center;margin-top:8px">'+
    '<label for="phGal" style="cursor:pointer;padding:7px 14px;background:var(--p);color:#E8C875;border-radius:8px;font-size:12px;font-weight:600">&#128247; Gallery</label>'+
    '<label for="phCam" style="cursor:pointer;padding:7px 14px;background:rgba(139,26,26,.1);color:var(--p);border:1px solid rgba(139,26,26,.3);border-radius:8px;font-size:12px;font-weight:600">&#128247; Camera</label>'+
    '</div>'+
    '<input type="file" id="phGal" accept="image/*" style="display:none">'+
    '<input type="file" id="phCam" accept="image/*" capture="environment" style="display:none">'+
    '</div>'+
    '<div class="fRow"><div class="fg"><label>Full Name *</label><input class="inp" id="asName" value="'+(s?s.name:"")+'" placeholder="Student full name"></div>'+
    '<div class="fg"><label>Class &amp; Division *</label>'+(divs.length?'<select class="inp" id="asCls">'+opts+'</select>':'<input class="inp" id="asCls" disabled placeholder="No classes — ask Admin">')+'</div></div>'+
    '<div class="fRow"><div class="fg"><label>Date of Birth</label><input class="inp" id="asDob" type="date" value="'+(s&&s.dob?s.dob:"")+'"></div>'+
    '<div class="fg"><label>Admission No.</label><input class="inp" id="asAdm" value="'+(s&&s.admNo?s.admNo:"")+'" placeholder="e.g. 2025001"></div></div>'+
    '<div class="fRow"><div class="fg"><label>Father\'s Name</label><input class="inp" id="asFather" value="'+(s&&s.fatherName?s.fatherName:"")+'" placeholder="Father\'s full name"></div>'+
    '<div class="fg"><label>Mother\'s Name</label><input class="inp" id="asMother" value="'+(s&&s.motherName?s.motherName:"")+'" placeholder="Mother\'s full name"></div></div>'+
    '<div class="fRow"><div class="fg"><label>Father\'s Mobile *</label><input class="inp" id="asMob" type="tel" value="'+(s&&s.mobile?s.mobile:"")+'" placeholder="10-digit number"></div>'+
    '<div class="fg"><label>Alt. Mobile</label><input class="inp" id="asMob2" type="tel" value="'+(s&&s.mobile2?s.mobile2:"")+'" placeholder="Mother / Guardian"></div></div>'+
    '<div class="fg"><label>Address</label><input class="inp" id="asAddr" value="'+(s&&s.address?s.address:"")+'" placeholder="Home address"></div>'+
    (!s&&divs.length?'<div class="tip">Student ID auto-generated e.g. '+(divs[0]||"10A")+'101</div>':"")+
    '<div class="flexRow gap12 mt12"><button class="btn btn-o" id="asCancel">Cancel</button><button class="btn btn-p" id="asSave">'+(s?"Save Changes":"Add Student")+'</button></div></div>'
  );
  function procPhoto(file){
    if(!file)return;
    var r=new FileReader();
    r.onload=function(ev){
      var img=new Image();img.onload=function(){
        var cv=document.createElement("canvas"),mxS=200,w=img.width,h=img.height;
        if(w>h){if(w>mxS){h=Math.round(h*mxS/w);w=mxS}}else{if(h>mxS){w=Math.round(w*mxS/h);h=mxS}}
        cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);
        pendingPhoto=cv.toDataURL("image/jpeg",0.75);
        var old=document.getElementById("pp");
        if(old){var ni=document.createElement("img");ni.id="pp";ni.src=pendingPhoto;ni.style.cssText="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--g);display:block;margin:0 auto 8px";old.parentNode.replaceChild(ni,old)}
      };img.src=ev.target.result;
    };r.readAsDataURL(file);
  }
  document.getElementById("phGal").addEventListener("change",function(e){procPhoto(e.target.files[0])});
  document.getElementById("phCam").addEventListener("change",function(e){procPhoto(e.target.files[0])});
  document.getElementById("asCancel").addEventListener("click",function(){editStuId=null;navTo("tstu")});
  document.getElementById("asSave").addEventListener("click",function(){
    var n=gv("asName"),cdEl=document.getElementById("asCls"),cd=cdEl?cdEl.value.trim():"";
    if(!n)return alert("Enter student name");
    if(!cd)return alert("Select a class");
    var parts=spDiv(cd);if(!parts)return alert("Invalid class: "+cd);
    var photo=pendingPhoto||(s?s.photo:null)||null;
    var data={name:n,cls:parts.cn,div:parts.dv,dob:gv("asDob")||null,admNo:gv("asAdm")||null,fatherName:gv("asFather")||null,motherName:gv("asMother")||null,mobile:gv("asMob")||null,mobile2:gv("asMob2")||null,address:gv("asAddr")||null,photo:photo};
    var stus=DB.getStudents();
    if(editStuId){for(var i=0;i<stus.length;i++){if(stus[i].id===editStuId){Object.assign(stus[i],data);break}}}
    else{data.id=DB.genStudentId(parts.cn,parts.dv);data.addedBy=CU.id;stus.push(data)}
    DB.saveStudents(stus);editStuId=null;pendingPhoto=null;navTo("tstu");
  });
}

// TEACHER — COLLECT FEES (Teacher collects fees based on Admin fee structure)
// ══════════════════════════════════════════════════
function rTFees(){
  var t=CU.teacher,cls=t.cls||"";
  var stus=cls?DB.getStudents().filter(function(s){return s.cls+s.div===cls}):DB.getStudents().filter(function(s){return s.addedBy===CU.id});
  var fs=JSON.parse(localStorage.getItem("tvv_feeStruct")||"[]");
  var clsFeeTypes=cls?fs.filter(function(f){return f.cls===cls}):[];
  var h='<div class="ph"><h1>Collect Fees</h1><p>'+(cls?"Class "+cls+" fee collection.":"Manage student fees.")+'</p></div>';
  if(!stus.length){h+='<div class="emptyMsg">No students in your class.</div>';setPage(h);return}
  // Grand summary
  var gT=0,gP=0;stus.forEach(function(s){var sm=DB.feeSummary(s.id);gT+=sm.total;gP+=sm.paid});
  h+='<div class="feeSumGrid">'+
    '<div class="feeSumCard"><div class="feeSumAmt" style="color:var(--bl)">&#8377;'+gT+'</div><div class="feeSumLbl">Total Billed</div></div>'+
    '<div class="feeSumCard"><div class="feeSumAmt" style="color:var(--ok)">&#8377;'+gP+'</div><div class="feeSumLbl">Collected</div></div>'+
    '<div class="feeSumCard"><div class="feeSumAmt" style="color:var(--er)">&#8377;'+(gT-gP)+'</div><div class="feeSumLbl">Pending</div></div>'+
    '</div>';
  if(!clsFeeTypes.length){
    h+='<div class="warn">No fee structure set for Class '+cls+'. Ask Admin to define fees in "Fee Structure".</div>';
  }
  h+='<div class="secH"><div class="secT">Students</div><button class="btn btn-p btn-sm" id="billAllBtn">&#128181; Bill Student</button></div>';
  h+='<div class="tWrap"><table><thead><tr><th>Student</th><th>Class</th><th>Total Billed</th><th>Paid</th><th>Pending</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
  stus.forEach(function(s){
    var sm=DB.feeSummary(s.id);
    h+='<tr>';
    h+='<td><div class="flexRow gap8">'+av(s.name,34,s.photo)+'<div><b>'+s.name+'</b><div class="xs muted">'+s.id+'</div></div></div></td>';
    h+='<td><span class="chip chip-p">'+s.cls+s.div+'</span></td>';
    h+='<td style="font-weight:600">&#8377;'+sm.total+'</td>';
    h+='<td style="color:var(--ok);font-weight:700">&#8377;'+sm.paid+'</td>';
    h+='<td style="color:'+(sm.pending>0?"var(--er)":"var(--ok)")+';font-weight:700">&#8377;'+sm.pending+'</td>';
    h+='<td>'+(sm.pending>0?'<span class="chip chip-er">Pending</span>':'<span class="chip chip-ok">Clear</span>')+'</td>';
    h+='<td><div class="flexRow gap4"><button class="btn btn-b btn-sm vFeeBtn" data-sid="'+s.id+'" data-sn="'+s.name+'">Details</button>'+
      (sm.pending>0?'<button class="btn btn-s btn-sm qPayBtn" data-sid="'+s.id+'" data-sn="'+s.name+'">Mark Paid</button>':'')+
      '</div></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  setPage(h);

  // Bill a student — add fee entry manually or from fee structure
  document.getElementById("billAllBtn").addEventListener("click",function(){
    var stuOpts='<option value="">— Select Student —</option>';
    stus.forEach(function(s){stuOpts+='<option value="'+s.id+'">'+s.name+' ('+s.cls+s.div+')</option>'});
    var fOpts='';
    if(clsFeeTypes.length){
      clsFeeTypes.forEach(function(f){fOpts+='<option value="'+f.id+'" data-amt="'+f.amount+'">'+f.label+' (&#8377;'+f.amount+')</option>'});
    }
    fOpts+='<option value="__custom">Custom / Other</option>';
    openModal("Add Fee Entry",
      '<div class="fg"><label>Student *</label><select class="inp" id="mBillStu">'+stuOpts+'</select></div>'+
      '<div class="fg"><label>Fee Type *</label><select class="inp" id="mBillType">'+fOpts+'</select></div>'+
      '<div class="fg"><label>Amount (&#8377;) *</label><input class="inp" id="mBillAmt" type="number" min="1" placeholder="Auto-filled from structure"></div>'+
      '<div class="fg"><label>Month / Period</label><input class="inp" id="mBillPeriod" placeholder="e.g. April 2025, Q1"></div>'+
      '<div class="fg"><label>Payment Status</label><select class="inp" id="mBillPaid"><option value="0">Pending</option><option value="1">Paid</option></select></div>'+
      '<div class="fg"><label>Note (optional)</label><input class="inp" id="mBillNote" placeholder="e.g. Cash received, Cheque no."></div>',
      '<button class="btn btn-o" id="mBillCancel">Cancel</button><button class="btn btn-p" id="mBillSave">Save Entry</button>'
    );
    // Auto-fill amount from fee structure
    document.getElementById("mBillType").addEventListener("change",function(){
      var sel=this.options[this.selectedIndex];
      var amt=sel.getAttribute("data-amt");
      if(amt)document.getElementById("mBillAmt").value=amt;
      else document.getElementById("mBillAmt").value="";
    });
    document.getElementById("mBillCancel").addEventListener("click",closeModal);
    document.getElementById("mBillSave").addEventListener("click",function(){
      var sid=document.getElementById("mBillStu").value;
      var ftSel=document.getElementById("mBillType");
      var ftVal=ftSel.value,ftLbl=ftSel.options[ftSel.selectedIndex]?ftSel.options[ftSel.selectedIndex].text.split(" (")[0]:"Fee";
      var amt=parseFloat(gv("mBillAmt"));
      var paid2=document.getElementById("mBillPaid").value==="1";
      if(!sid)return alert("Select a student");
      if(!ftVal)return alert("Select fee type");
      if(isNaN(amt)||amt<=0)return alert("Enter valid amount");
      var ff=DB.getFees();
      ff.push({id:uid(),sid:sid,label:ftLbl.replace(/&#8377;/g,""),amount:amt,period:gv("mBillPeriod"),paid:paid2,note:gv("mBillNote"),date:today(),addedBy:CU.id});
      DB.saveFees(ff);closeModal();rTFees();
    });
  });

  document.querySelectorAll(".vFeeBtn").forEach(function(b){
    b.addEventListener("click",function(){showFeeDetails(b.getAttribute("data-sid"),b.getAttribute("data-sn"),true)});
  });

  // Quick mark all pending as paid
  document.querySelectorAll(".qPayBtn").forEach(function(b){
    b.addEventListener("click",function(){
      if(!confirm("Mark all pending fees as paid for "+b.getAttribute("data-sn")+"?"))return;
      var sid=b.getAttribute("data-sid"),ff=DB.getFees();
      ff.forEach(function(f){if(f.sid===sid&&!f.paid)f.paid=true});
      DB.saveFees(ff);rTFees();
    });
  });
}

// TEACHER — ATTENDANCE
// ══════════════════════════════════════════════════
function rTAttend(){
  attDate=attDate||today();
  var t=CU.teacher,cls=t.cls||"";
  if(!cls){setPage('<div class="ph"><h1>Attendance</h1></div><div class="tip">No class assigned. Ask Admin.</div>');return}
  var stus=DB.getStudents().filter(function(s){return s.cls+s.div===cls});
  attMap={};stus.forEach(function(s){var r=DB.getAttRecord(s.id,attDate);attMap[s.id]=r?r.ok:null});
  var pr=Object.keys(attMap).filter(function(k){return attMap[k]===true}).length;
  var ab=Object.keys(attMap).filter(function(k){return attMap[k]===false}).length;
  var h='<div class="ph"><h1>Mark Attendance</h1><p>Class '+cls+'</p></div>';
  h+='<div class="dbar">&#128197; <input type="date" id="attDt" value="'+attDate+'" max="'+today()+'"></div>';
  h+='<div class="flexRow wrap gap8 mb12"><span class="chip chip-ok" id="prCnt">Present: '+pr+'</span><span class="chip chip-er" id="abCnt">Absent: '+ab+'</span><div style="flex:1"></div>';
  h+='<button class="btn btn-s btn-sm" id="allP">All P</button><button class="btn btn-d btn-sm" id="allA">All A</button><button class="btn btn-p btn-sm" id="saveAtt">&#128190; Save</button></div>';
  if(!stus.length)h+='<div class="emptyMsg">No students.</div>';
  else stus.forEach(function(s){
    var bd=isBday(s.dob)?" &#127881;":"";
    h+='<div class="attRow">'+av(s.name,36,s.photo)+'<div style="flex:1"><b style="font-size:13px">'+s.name+bd+'</b><div class="xs muted">'+s.id+'</div></div>';
    h+='<div class="attToggle"><button class="attP '+(attMap[s.id]===true?"on":"")+'" data-sid="'+s.id+'">P</button><button class="attA '+(attMap[s.id]===false?"on":"")+'" data-sid="'+s.id+'">A</button></div></div>';
  });
  setPage(h);
  var di=document.getElementById("attDt");
  if(di)di.addEventListener("change",function(){attDate=this.value;stus.forEach(function(s){var r=DB.getAttRecord(s.id,attDate);attMap[s.id]=r?r.ok:null});rTAttend()});
  document.querySelectorAll(".attP").forEach(function(b){b.addEventListener("click",function(){var sid=b.getAttribute("data-sid");attMap[sid]=attMap[sid]===true?null:true;updAtt(sid)})});
  document.querySelectorAll(".attA").forEach(function(b){b.addEventListener("click",function(){var sid=b.getAttribute("data-sid");attMap[sid]=attMap[sid]===false?null:false;updAtt(sid)})});
  var ap=document.getElementById("allP");if(ap)ap.addEventListener("click",function(){stus.forEach(function(s){attMap[s.id]=true});rTAttend()});
  var aa=document.getElementById("allA");if(aa)aa.addEventListener("click",function(){stus.forEach(function(s){attMap[s.id]=false});rTAttend()});
  var sv=document.getElementById("saveAtt");
  if(sv)sv.addEventListener("click",function(){Object.keys(attMap).forEach(function(sid){if(attMap[sid]!==null)DB.saveAttRecord({sid:sid,date:attDate,ok:attMap[sid],by:CU.id})});alert("Saved!")});
}
function updAtt(sid){
  document.querySelectorAll('.attP[data-sid="'+sid+'"]').forEach(function(b){b.className="attP"+(attMap[sid]===true?" on":"")});
  document.querySelectorAll('.attA[data-sid="'+sid+'"]').forEach(function(b){b.className="attA"+(attMap[sid]===false?" on":"")});
  var pr=Object.keys(attMap).filter(function(k){return attMap[k]===true}).length;
  var ab=Object.keys(attMap).filter(function(k){return attMap[k]===false}).length;
  var pe=document.getElementById("prCnt");if(pe)pe.textContent="Present: "+pr;
  var ae=document.getElementById("abCnt");if(ae)ae.textContent="Absent: "+ab;
}
function rTAttView(){
  var t=CU.teacher,cls=t.cls||"";
  var stus=cls?DB.getStudents().filter(function(s){return s.cls+s.div===cls}):[];
  var h='<div class="ph"><h1>Attendance Report</h1><p>'+(cls?"Class "+cls:"No class assigned")+'</p></div>';
  h+='<div class="flexRow gap12 mb12" style="align-items:center"><button class="btn btn-o btn-sm" id="tvP">&#9664;</button><span class="semi" style="min-width:130px;text-align:center">'+monFull(tvM)+" "+tvY+'</span><button class="btn btn-o btn-sm" id="tvN">&#9654;</button></div>';
  if(stus.length){
    h+='<div class="tWrap"><table><thead><tr><th>Student</th><th>Present</th><th>Absent</th><th>Total</th><th>Rate</th></tr></thead><tbody>';
    stus.forEach(function(s){var sm=DB.monthAtt(s.id,tvY,tvM),p2=pct(sm.present,sm.total);
      h+='<tr><td><div class="flexRow gap8">'+av(s.name,30,s.photo)+'<b>'+s.name+'</b></div></td>';
      h+='<td><span class="chip chip-ok">'+sm.present+'</span></td><td><span class="chip chip-er">'+sm.absent+'</span></td><td>'+sm.total+'</td>';
      h+='<td><div class="flexRow gap8"><div class="pbar" style="width:80px"><div class="pfill" style="width:'+p2+'%;background:'+(p2>=75?"var(--ok)":"var(--er)")+'"></div></div><b style="font-size:11px;color:'+(p2>=75?"var(--ok)":"var(--er)")+'">'+p2+'%</b></div></td></tr>';
    });
    h+='</tbody></table></div>';
  }else h+='<div class="tip">No students.</div>';
  setPage(h);
  var tp=document.getElementById("tvP");if(tp)tp.addEventListener("click",function(){tvM--;if(tvM<1){tvM=12;tvY--}rTAttView()});
  var tn=document.getElementById("tvN");if(tn)tn.addEventListener("click",function(){tvM++;if(tvM>12){tvM=1;tvY++}rTAttView()});
}

// ══════════════════════════════════════════════════
// STUDENT — PROFILE
// ══════════════════════════════════════════════════
function rStudentProfile(){
  var s=CU.student||DB.getStudentById(CU.id);if(!s){setPage('<div class="emptyMsg">Not found.</div>');return}
  var att=DB.monthAtt(s.id,new Date().getFullYear(),new Date().getMonth()+1),p2=pct(att.present,att.total);
  var fsm=DB.feeSummary(s.id);
  var bd=isBday(s.dob)?'<div class="bdBanner mb16"><div class="bdIcon">&#127881;</div><div><b>Happy Birthday, '+s.name+'!</b><div class="sm">Wishing you a wonderful day!</div></div></div>':"";
  var ph=s.photo?'<img src="'+s.photo+'" style="width:80px;height:80px;border-radius:50%;object-fit:cover">':'<div class="stuHeroAv">'+s.name[0].toUpperCase()+'</div>';
  setPage(
    bd+
    '<div class="stuHero">'+ph+
    '<div class="stuHeroInfo"><h2>'+s.name+'</h2><div class="sid">'+s.id+' | Class '+s.cls+s.div+'</div>'+
    (s.admNo?'<div style="font-size:11px;color:rgba(255,255,255,.7);margin-top:2px">Adm: '+s.admNo+'</div>':'')+
    '</div></div>'+
    '<div class="card mb16"><div class="secT mb12">Personal Details</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">'+
    '<div><div class="xs muted">Date of Birth</div><b>'+(s.dob?fmtDob(s.dob):"—")+'</b></div>'+
    '<div><div class="xs muted">Age</div><b>'+(s.dob?calcAge(s.dob):"—")+'</b></div>'+
    '<div><div class="xs muted">Father\'s Name</div><b>'+(s.fatherName||"—")+'</b></div>'+
    '<div><div class="xs muted">Mother\'s Name</div><b>'+(s.motherName||"—")+'</b></div>'+
    '<div><div class="xs muted">Father\'s Mobile</div><b>'+(s.mobile||"—")+'</b></div>'+
    '<div><div class="xs muted">Alt Mobile</div><b>'+(s.mobile2||"—")+'</b></div>'+
    (s.address?'<div style="grid-column:1/-1"><div class="xs muted">Address</div><b>'+s.address+'</b></div>':"")+
    '</div></div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">'+
    '<div class="card" style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--ok)">'+att.present+'</div><div class="xs muted">Present</div></div>'+
    '<div class="card" style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--er)">'+att.absent+'</div><div class="xs muted">Absent</div></div>'+
    '<div class="card" style="text-align:center"><div style="font-size:22px;font-weight:800;color:'+(fsm.pending>0?"var(--er)":"var(--ok)")+'">'+(fsm.pending>0?"&#8377;"+fsm.pending:"Clear")+'</div><div class="xs muted">Fees Due</div></div>'+
    '</div>'
  );
}

// ══════════════════════════════════════════════════
// STUDENT — MY FEES
// ══════════════════════════════════════════════════
function rStudentFees(){
  var s=CU.student||DB.getStudentById(CU.id);if(!s){setPage('<div class="emptyMsg">Not found.</div>');return}
  var fsm=DB.feeSummary(s.id);
  var h='<div class="ph"><h1>My Fees</h1><p>'+s.name+' — '+s.id+'</p></div>';
  h+='<div class="feeSumGrid">'+
    '<div class="feeSumCard"><div class="feeSumAmt" style="color:var(--bl)">&#8377;'+fsm.total+'</div><div class="feeSumLbl">Total Billed</div></div>'+
    '<div class="feeSumCard"><div class="feeSumAmt" style="color:var(--ok)">&#8377;'+fsm.paid+'</div><div class="feeSumLbl">Paid</div></div>'+
    '<div class="feeSumCard"><div class="feeSumAmt" style="color:'+(fsm.pending>0?"var(--er)":"var(--ok)")+'">&#8377;'+fsm.pending+'</div><div class="feeSumLbl">Pending</div></div>'+
    '</div>';
  if(!fsm.entries.length)h+='<div class="emptyMsg">No fee records yet.</div>';
  else{
    h+='<div class="card"><div class="secT mb12">Fee Details</div>';
    fsm.entries.forEach(function(f){
      h+='<div class="feeRow"><div><div class="semi">'+f.label+'</div><div class="xs muted">'+(f.period?f.period+" | ":"")+f.date+'</div></div>';
      h+='<div class="flexRow gap8"><span class="feeAmt">&#8377;'+f.amount+'</span><span class="chip '+(f.paid?"chip-ok":"chip-er")+'">'+(f.paid?"&#9989; Paid":"&#9888; Pending")+'</span></div></div>';
    });
    h+='</div>';
  }
  setPage(h);
}

// ══════════════════════════════════════════════════
// STUDENT — MY MARKS
// ══════════════════════════════════════════════════
function rStudentMarks(){
  var s=CU.student||DB.getStudentById(CU.id);if(!s){setPage('<div class="emptyMsg">Not found.</div>');return}
  var marks=DB.getMarks().filter(function(m){return m.sid===s.id});
  var h='<div class="ph"><h1>My Marks</h1><p>'+s.name+' — '+s.id+'</p></div>';
  if(!marks.length){h+='<div class="emptyMsg">No marks added yet.</div>';setPage(h);return}
  var tot=marks.reduce(function(a,m){return a+m.obtained},0),max=marks.reduce(function(a,m){return a+m.total},0);
  var op=pct(tot,max),og=grade(op);
  h+='<div class="card mb16" style="text-align:center"><div style="font-size:40px;font-weight:800" class="'+gradeClass(og)+'">'+og+'</div>'+
    '<div class="sm muted mt8">Overall: '+tot+'/'+max+' ('+op+'%)</div>'+
    '<div class="pbar mt8"><div class="pfill" style="width:'+op+'%;background:'+(op>=60?"var(--ok)":"var(--er)")+'"></div></div></div>';
  var byType={"CT":[],"UT":[],"HY":[],"FY":[],"PT":[]};
  marks.forEach(function(m){if(byType[m.type])byType[m.type].push(m)});
  ["CT","UT","HY","FY","PT"].forEach(function(tp){
    if(!byType[tp].length)return;
    h+='<div class="secT mb8">'+examLbl(tp)+'</div>';
    h+='<div class="tWrap mb16"><table><thead><tr><th>Subject</th><th>Obtained</th><th>Total</th><th>%</th><th>Grade</th><th>Remarks</th></tr></thead><tbody>';
    byType[tp].forEach(function(m){var p2=pct(m.obtained,m.total),g=grade(p2);
      h+='<tr><td class="semi">'+m.subject+'</td><td style="color:var(--bl);font-weight:700">'+m.obtained+'</td><td>'+m.total+'</td><td>'+p2+'%</td>';
      h+='<td class="'+gradeClass(g)+'" style="font-size:14px">'+g+'</td><td class="muted sm">'+(m.remarks||"—")+'</td></tr>';
    });
    h+='</tbody></table></div>';
  });
  setPage(h);
}

// ══════════════════════════════════════════════════
// STUDENT — MY ATTENDANCE
// ══════════════════════════════════════════════════
function rStudentAtt(){
  var s=CU.student||DB.getStudentById(CU.id);if(!s){setPage('<div class="emptyMsg">Not found.</div>');return}
  var pfx=saY+"-"+(saM<10?"0"+saM:""+saM);
  var recs=DB.getAttendance().filter(function(r){return r.sid===s.id&&r.date.indexOf(pfx)===0}).sort(function(a,b){return b.date.localeCompare(a.date)});
  var sm=DB.monthAtt(s.id,saY,saM),p2=pct(sm.present,sm.total);
  var h='<div class="ph"><h1>My Attendance</h1><p>'+s.name+' — '+s.id+'</p></div>';
  h+='<div class="flexRow gap12 mb12" style="align-items:center"><button class="btn btn-o btn-sm" id="saPrev">&#9664;</button><span class="semi" style="min-width:140px;text-align:center">'+monFull(saM)+" "+saY+'</span><button class="btn btn-o btn-sm" id="saNext">&#9654;</button></div>';
  h+='<div class="card mb16"><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center;margin-bottom:12px">'+
    '<div style="background:rgba(46,125,50,.08);border-radius:10px;padding:12px"><div style="font-size:22px;font-weight:800;color:var(--ok)">'+sm.present+'</div><div class="xs muted">Present</div></div>'+
    '<div style="background:rgba(198,40,40,.08);border-radius:10px;padding:12px"><div style="font-size:22px;font-weight:800;color:var(--er)">'+sm.absent+'</div><div class="xs muted">Absent</div></div>'+
    '<div style="background:rgba(212,168,67,.1);border-radius:10px;padding:12px"><div style="font-size:22px;font-weight:800;color:var(--gd)">'+p2+'%</div><div class="xs muted">Rate</div></div>'+
    '</div><div class="pbar"><div class="pfill" style="width:'+p2+'%;background:'+(p2>=75?"var(--ok)":"var(--er)")+'"></div></div>'+
    '<div class="xs muted mt8">'+(p2>=75?"&#9989; Good attendance!":"&#9888; Below 75% — needs improvement")+'</div></div>';
  if(!recs.length)h+='<div class="emptyMsg">No records this month.</div>';
  else recs.forEach(function(r){
    h+='<div class="card mb8 flexRow gap12"><div style="width:44px;height:44px;border-radius:10px;flex-shrink:0;background:'+(r.ok?"rgba(46,125,50,.1)":"rgba(198,40,40,.1)")+';display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:'+(r.ok?"var(--ok)":"var(--er)")+'">'+r.date.slice(8)+'</div>';
    h+='<div style="flex:1"><b style="font-size:13px">'+fmtD(r.date)+'</b></div><span class="chip '+(r.ok?"chip-ok":"chip-er")+'">'+(r.ok?"&#10003; Present":"&#10007; Absent")+'</span></div>';
  });
  setPage(h);
  var sp=document.getElementById("saPrev");if(sp)sp.addEventListener("click",function(){saM--;if(saM<1){saM=12;saY--}rStudentAtt()});
  var sn=document.getElementById("saNext");if(sn)sn.addEventListener("click",function(){saM++;if(saM>12){saM=1;saY++}rStudentAtt()});
}
